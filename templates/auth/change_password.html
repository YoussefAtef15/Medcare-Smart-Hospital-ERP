{% extends 'base.html' %}

{% block content %}
<div class="container-fluid px-0">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold">Security Settings</h3>
            <p class="text-muted mb-0">Update your account password securely.</p>
        </div>
    </div>

    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    <h5 class="fw-bold text-center mb-4 text-dark"><i class="bi bi-shield-lock-fill text-warning me-2 fs-3"></i> Change Password</h5>

                    <form action="/change_password" method="POST">
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small">Current Password</label>
                            <input type="password" class="form-control bg-light" name="current_password" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small">New Password</label>
                            <input type="password" class="form-control border-primary" name="new_password" required minlength="6">
                            <small class="text-muted d-block mt-1">Password must be at least 6 characters long.</small>
                        </div>

                        <div class="mb-5">
                            <label class="form-label text-muted fw-bold small">Confirm New Password</label>
                            <input type="password" class="form-control border-primary" name="confirm_password" required minlength="6">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning fw-bold py-2 shadow-sm rounded-pill text-dark">
                                Update Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
